name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check src/routes/auth.js
          node --check src/routes/linije.js
          node --check src/routes/stanice.js
          node --check src/routes/vozac.js
          node --check src/repositories/authRepo.js
          node --check src/repositories/linijeRepo.js
          node --check src/repositories/staniceRepo.js
          node --check src/repositories/vozacRepo.js
          node --check src/openapi.js

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
        run: npm run build
