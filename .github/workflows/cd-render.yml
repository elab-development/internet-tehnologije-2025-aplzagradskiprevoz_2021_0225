name: CD Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy To Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy
        env:
          BACKEND_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$BACKEND_HOOK" ]; then
            echo "Missing secret: RENDER_BACKEND_DEPLOY_HOOK"
            exit 1
          fi
          curl -fsS -X POST "$BACKEND_HOOK"

      - name: Trigger frontend deploy
        env:
          FRONTEND_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$FRONTEND_HOOK" ]; then
            echo "Missing secret: RENDER_FRONTEND_DEPLOY_HOOK"
            exit 1
          fi
          curl -fsS -X POST "$FRONTEND_HOOK"
